<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC APEX v10.9 - Precision 25%</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Outfit:wght@300;600;900&display=swap');
        :root { --bg: #000000; --panel: rgba(10, 10, 15, 0.98); --gold: #ffaa00; --neon-g: #00ffa3; --neon-r: #ff2e5b; --neon-b: #00d9ff; --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 30px; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; background: #000; flex-shrink: 0; border-bottom: 1px solid var(--border); }
        .brand { font-size: 0.55rem; letter-spacing: 2px; font-weight: 900; color: var(--gold); }
        .sys-live { font-size: 0.5rem; color: var(--neon-g); font-family: 'JetBrains Mono'; font-weight: 800; }
        .chart-container { height: 48vh; width: 100%; position: relative; background: #000; flex-shrink: 0; }
        .terminal { flex-grow: 1; background: var(--panel); padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
        .session-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0 5px 0; border-bottom: 1px solid var(--border); }
        .sess-lbl { font-size: 0.5rem; color: #555; font-weight: 800; text-transform: uppercase; }
        .sess-val { font-size: 0.6rem; color: #e1b12c; font-family: 'JetBrains Mono'; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        #edit-trigger { cursor: pointer; color: var(--gold); font-size: 0.75rem; background: rgba(255,170,0,0.1); padding: 0 4px; border-radius: 3px; border: 1px solid rgba(255,170,0,0.3); display: none; }
        .input-hub { display: grid; grid-template-columns: 1fr 1px 1fr; background: #000; border-radius: 4px; border: 1px solid var(--border); height: 28px; align-items: center; }
        .input-hub input { width: 100%; background: transparent; border: none; color: #fff; font-family: 'JetBrains Mono'; font-size: 0.8rem; text-align: center; outline: none; font-weight: 700; }
        .input-hub .sep { background: var(--border); height: 10px; width: 1px; }
        #strategy-box { background: rgba(255,255,255,0.02); border-radius: 4px; padding: 8px 10px; border-left: 2px solid var(--gold); display: none; cursor: pointer; }
        .strat-title { font-size: 0.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 1px; }
        .strat-text { font-size: 0.6rem; line-height: 1.4; color: #aaa; font-family: 'JetBrains Mono'; }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .res-box { background: rgba(255,255,255,0.01); padding: 7px 2px; border-radius: 4px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
        .res-box.ote { border-color: var(--neon-g); background: rgba(0, 255, 163, 0.02); }
        .lbl { font-size: 0.4rem; color: #444; display: block; text-transform: uppercase; margin-bottom: 1px; }
        .val { font-family: 'JetBrains Mono'; font-size: 0.75rem; font-weight: 800; color: #fff; }
        .footer-area { margin: 10px 0; text-align: center; }
        .signature { font-size: 0.45rem; letter-spacing: 3px; font-weight: 600; text-transform: uppercase; color: #333; }
        #toast { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 3px 15px; border-radius: 2px; font-size: 0.5rem; font-weight: 900; display: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="toast">COPIED</div>
    <div class="header">
        <div class="brand">SMC APEX AI <span>V10.9</span></div>
        <div id="clock" class="sys-live">00:00:00</div>
    </div>
    <div class="chart-container"><div id="tv_v109" style="height: 100%; width: 100%;"></div></div>
    <div class="terminal">
        <div class="session-row">
            <span class="sess-lbl">Market Condition</span>
            <span class="sess-val"><span id="current-session">DETECTING...</span><span id="edit-trigger" onclick="toggleInput(true)">↻</span></span>
        </div>
        <div class="input-hub" id="input-hub-main">
            <input type="number" id="startP" placeholder="START H/L" step="any" onkeydown="if(event.key==='Enter') instantScan()">
            <div class="sep"></div>
            <input type="number" id="endP" placeholder="END L/H" step="any" onkeydown="if(event.key==='Enter') instantScan()">
        </div>
        <div id="strategy-box" onclick="copyAiAdvisor()">
            <div class="strat-title" id="strat-label">AI_ADVISOR</div>
            <div class="strat-text" id="strat-desc">Input market range...</div>
        </div>
        <div class="res-grid">
            <div class="res-box" onclick="copyVal(this)"><span class="lbl">0.62 Zone</span><span id="r62" class="val">---</span></div>
            <div class="res-box ote" onclick="copyVal(this)"><span class="lbl">0.705 OTE</span><span id="r705" class="val" style="color:var(--neon-g)">---</span></div>
            <div class="res-box" onclick="copyVal(this)"><span class="lbl">0.79 Zone</span><span id="r79" class="val">---</span></div>
        </div>
        <div class="footer-area"><div class="signature">URTRADER© QUANTUM TERMINAL</div></div>
        <div class="res-grid">
            <div class="res-box" onclick="copyVal(this)"><span class="lbl">Target TP</span><span id="rTP" class="val" style="color:var(--neon-b)">---</span></div>
            <div class="res-box" onclick="copyVal(this)"><span class="lbl">Risk SL</span><span id="rSL" class="val" style="color:var(--neon-r)">---</span></div>
            <div class="res-box" style="border-color:var(--gold)" onclick="copyVal(this)"><span class="lbl">Total Pips</span><span id="rPips" class="val" style="color:var(--gold)">+0.0 P</span></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15",
            "timezone": "Asia/Jakarta", "theme": "dark", "style": "1", "locale": "id",
            "toolbar_bg": "#000000", "enable_publishing": false, "hide_side_toolbar": true,
            "allow_symbol_change": true, "container_id": "tv_v109", "session": "24x7"
        });

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 1000); }
        function copyVal(el) { const v = el.querySelector('.val').innerText; if (v === "---") return; navigator.clipboard.writeText(v); showToast("COPIED: " + v); }
        function copyAiAdvisor() { const t = document.getElementById('strat-desc').innerText; navigator.clipboard.writeText(t); showToast("STRATEGY COPIED"); }
        function toggleInput(show) { document.getElementById('input-hub-main').style.display = show ? 'grid' : 'none'; document.getElementById('edit-trigger').style.display = show ? 'none' : 'inline-block'; if(show) document.getElementById('startP').focus(); }
        function updateSession() { const h = new Date().getHours(); let s = (h >= 7 && h < 14) ? "SYDNEY_TOKYO" : (h >= 14 && h < 20) ? "LONDON_OPEN" : (h >= 20 || h < 4) ? "NEW_YORK_OPEN" : "RETRACEMENT"; document.getElementById('current-session').innerText = s; return s; }
        setInterval(() => { const n = new Date(); document.getElementById('clock').innerText = `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}:${String(n.getSeconds()).padStart(2, '0')}`; }, 1000);

        function instantScan() {
            const s = parseFloat(document.getElementById('startP').value);
            const e = parseFloat(document.getElementById('endP').value);
            if (isNaN(s) || isNaN(e)) return;
            const range = Math.abs(s - e);
            const isBull = e > s;
            let r62 = isBull ? e - (range * 0.62) : e + (range * 0.62);
            let o705 = isBull ? e - (range * 0.705) : e + (range * 0.705);
            let r79 = isBull ? e - (range * 0.79) : e + (range * 0.79);
            let sl = isBull ? s - (range * 0.05) : s + (range * 0.05);
            
            // TARGET TP 25%
            let tp = isBull ? e + (range * 0.25) : e - (range * 0.25);
            
            // LOGIKA PIPS ADAPTIF (BTC vs GOLD)
            let pipsValue = s > 10000 ? Math.abs(tp - o705).toFixed(1) : (Math.abs(tp - o705) * 10).toFixed(1);

            const aiBox = document.getElementById('strategy-box');
            document.getElementById('strat-label').innerText = `[AI_SENSE: ${range > 12 ? 'TRENDING' : 'STABLE'}]`;
            document.getElementById('strat-label').style.color = isBull ? "var(--neon-g)" : "var(--neon-r)";
            document.getElementById('strat-desc').innerHTML = isBull ? 
                `Level 0.62 (${r62.toFixed(2)}) konfirmasi. Titik 0.705 (${o705.toFixed(2)}) OTE Buy. Batas 0.79 (${r79.toFixed(2)}) pertahanan struktur.<br><span style="color:var(--gold); font-size:0.5rem;">> LOGIC: Target TP 25% (+${pipsValue} Pips).</span>` :
                `Level 0.62 (${r62.toFixed(2)}) resistance. 0.705 (${o705.toFixed(2)}) Sweet Spot Sell. Batas 0.79 (${r79.toFixed(2)}) pertahanan Smart Money.<br><span style="color:var(--gold); font-size:0.5rem;">> LOGIC: Target TP 25% (+${pipsValue} Pips).</span>`;
            
            aiBox.style.display = "block";
            aiBox.style.borderLeftColor = isBull ? "var(--neon-g)" : "var(--neon-r)";
            document.getElementById('r62').innerText = r62.toFixed(3);
            document.getElementById('r705').innerText = o705.toFixed(3);
            document.getElementById('r79').innerText = r79.toFixed(3);
            document.getElementById('rSL').innerText = sl.toFixed(3);
            document.getElementById('rTP').innerText = tp.toFixed(3);
            document.getElementById('rPips').innerText = "+" + pipsValue + " P";
            toggleInput(false);
        }
        updateSession();
    </script>
</body>
</html>
