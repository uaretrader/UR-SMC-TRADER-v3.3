<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC APEX v9.7 - UI Precision</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Outfit:wght@300;600;900&display=swap');

        :root {
            --bg: #000000;
            --panel: #0a0a0f;
            --gold: #ffaa00;
            --neon-g: #00ffa3;
            --neon-r: #ff2e5b;
            --neon-b: #00d9ff;
            --border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .header { 
            height: 35px; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 12px; background: #000; flex-shrink: 0;
            position: relative; z-index: 10;
        }
        .brand { font-size: 0.65rem; letter-spacing: 2px; font-weight: 900; color: var(--gold); }
        
        /* 1. FIXED: Perbesar Clock */
        .sys-live { 
            font-size: 0.65rem; /* Ukuran diperbesar dari 0.45rem */
            color: var(--neon-g); 
            font-family: 'JetBrains Mono'; 
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .chart-container { 
            height: 48vh; width: 100%; position: relative;
            background: #000; flex-shrink: 0;
        }

        .news-ticker {
            background: #111;
            border-top: 1px solid var(--border);
            border-bottom: 2px solid var(--gold);
            height: 28px; display: flex; align-items: center;
            overflow: hidden; white-space: nowrap; flex-shrink: 0;
            position: relative; z-index: 5;
        }
        .news-label { 
            background: var(--gold); color: #000; font-size: 0.55rem; 
            font-weight: 900; padding: 0 10px; height: 100%; 
            display: flex; align-items: center; z-index: 10;
        }
        .news-content {
            display: inline-block; padding-left: 100%;
            animation: ticker 25s linear infinite;
            font-family: 'JetBrains Mono'; font-size: 0.65rem;
            color: #fff; font-weight: 500;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .terminal { 
            flex-grow: 1; background: var(--panel); padding: 10px 15px;
            display: flex; flex-direction: column; gap: 8px;
            position: relative; z-index: 1;
            border-top: 1px solid var(--border);
        }

        /* 2. FIXED: Kurangi tinggi kolom & sesuaikan ukuran angka */
        .input-hub { 
            display: grid; grid-template-columns: 1fr 1px 1fr;
            background: #000; border-radius: 10px; border: 1px solid var(--border);
            flex-shrink: 0;
            height: 42px; /* Tinggi dikurangi agar lebih ramping */
            align-items: center;
        }
        .input-hub input { 
            width: 100%; padding: 0; background: transparent; border: none;
            color: #fff; font-family: 'JetBrains Mono'; 
            font-size: 1.05rem; /* Angka disesuaikan agar seimbang */
            text-align: center; outline: none;
            font-weight: 700;
        }
        .input-hub .sep { background: var(--border); height: 18px; width: 1px; }

        #strategy-box {
            background: rgba(255,255,255,0.03); border-radius: 10px;
            padding: 10px; border-left: 3px solid var(--gold);
            min-height: 55px; display: none; flex-shrink: 0;
        }
        .strat-title { font-size: 0.55rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .strat-text { font-size: 0.72rem; line-height: 1.3; color: #ddd; font-family: 'JetBrains Mono'; }

        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; flex-shrink: 0; }
        .res-box { 
            background: rgba(255,255,255,0.02); padding: 12px 2px; border-radius: 12px;
            border: 1px solid var(--border); text-align: center;
        }
        .res-box.ote { border-color: var(--neon-g); background: rgba(0, 255, 163, 0.05); }
        
        .lbl { font-size: 0.45rem; color: #777; display: block; margin-bottom: 3px; text-transform: uppercase; }
        .val { font-family: 'JetBrains Mono'; font-size: 0.9rem; font-weight: 700; color: #fff; }

        .footer-area { margin-top: auto; padding-bottom: 10px; text-align: center; flex-shrink: 0; }
        .signature { font-size: 0.5rem; color: #444; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">SMC APEX <span>V9.7</span></div>
        <div id="clock" class="sys-live">SYS_READY</div>
    </div>

    <div class="chart-container">
        <div id="tv_v97" style="height: 100%; width: 100%;"></div>
    </div>

    <div class="news-ticker">
        <div class="news-label">MARKET_NEWS</div>
        <div class="news-content" id="news-feed">
            DXY STRENGTHENING... WATCH XAUUSD FOR POTENTIAL BREAKOUT... FED MEETING SCHEDULED...
        </div>
    </div>

    <div class="terminal">
        <div class="input-hub">
            <input type="number" id="startP" placeholder="START" step="any" onkeydown="if(event.key==='Enter') instantScan()">
            <div class="sep"></div>
            <input type="number" id="endP" placeholder="END" step="any" onkeydown="if(event.key==='Enter') instantScan()">
        </div>

        <div id="strategy-box">
            <div class="strat-title" id="strat-label">ANALYSIS</div>
            <div class="strat-text" id="strat-desc">Waiting for input...</div>
        </div>

        <div class="res-grid">
            <div class="res-box" onclick="copyValue('r62')"><span class="lbl">0.62 Zone</span><span id="r62" class="val">---</span></div>
            <div class="res-box ote" onclick="copyValue('r705')"><span class="lbl">0.705 OTE</span><span id="r705" class="val" style="color:var(--neon-g)">---</span></div>
            <div class="res-box" onclick="copyValue('r79')"><span class="lbl">0.79 Zone</span><span id="r79" class="val">---</span></div>
        </div>

        <div class="res-grid">
            <div class="res-box" onclick="copyValue('rTP')"><span class="lbl">Target TP</span><span id="rTP" class="val" style="color:var(--neon-b)">---</span></div>
            <div class="res-box" onclick="copyValue('rSL')"><span class="lbl">Risk SL</span><span id="rSL" class="val" style="color:var(--neon-r)">---</span></div>
            <div class="res-box" style="border-color:var(--gold)" onclick="copyValue('rWin')"><span class="lbl">Win Rate</span><span id="rWin" class="val" style="color:var(--gold)">---</span></div>
        </div>

        <div class="footer-area">
            <div class="signature">URTRADER© QUANTUM TERMINAL</div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "OANDA:XAUUSD",
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "id",
            "toolbar_bg": "#000000",
            "hide_side_toolbar": true, 
            "allow_symbol_change": true,
            "container_id": "tv_v97"
        });

        const newsItems = [
            "⚠️ FED Interest Rate Decision in 4 Hours",
            "📈 USD Index testing resistance - GOLD Volatility Alert",
            "🔥 SMC Bias: Bearish rejection at Daily Supply",
            "📊 NFP Data release tomorrow at 20:30 GMT+7"
        ];
        document.getElementById('news-feed').innerHTML = newsItems.join(" &nbsp;&nbsp; | &nbsp;&nbsp; ");

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = `SYS_STABLE: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }, 1000);

        function copyValue(id) {
            const val = document.getElementById(id).innerText;
            if (val === "---") return;
            navigator.clipboard.writeText(val);
            const box = document.getElementById(id).parentElement;
            box.style.background = "rgba(255,255,255,0.1)";
            setTimeout(() => { box.style.background = "rgba(255,255,255,0.02)"; }, 150);
        }

        function instantScan() {
            const s = parseFloat(document.getElementById('startP').value);
            const e = parseFloat(document.getElementById('endP').value);
            if (isNaN(s) || isNaN(e)) return;

            const stratBox = document.getElementById('strategy-box');
            const stratDesc = document.getElementById('strat-desc');
            const stratLabel = document.getElementById('strat-label');
            const range = Math.abs(s - e);
            let o62, o705, o79, sl, tp, wr;

            stratBox.style.display = "block";
            if (e > s) {
                o62 = e - (range * 0.62); o705 = e - (range * 0.705); o79 = e - (range * 0.79);
                sl = s - (range * 0.05); tp = e + (range * 0.27); wr = (84 + Math.random()*5).toFixed(1) + "%";
                stratLabel.innerText = "Bullish Setup Confirmed";
                stratLabel.style.color = "var(--neon-g)";
                stratBox.style.borderLeftColor = "var(--neon-g)";
                stratDesc.innerHTML = `Entry <b>Buy Limit</b> di <b>${o705.toFixed(2)}</b>. SL di bawah <b>${sl.toFixed(2)}</b>.`;
            } else {
                o62 = e + (range * 0.62); o705 = e + (range * 0.705); o79 = e + (range * 0.79);
                sl = s + (range * 0.05); tp = e - (range * 0.27); wr = (81 + Math.random()*5).toFixed(1) + "%";
                stratLabel.innerText = "Bearish Setup Confirmed";
                stratLabel.style.color = "var(--neon-r)";
                stratBox.style.borderLeftColor = "var(--neon-r)";
                stratDesc.innerHTML = `Entry <b>Sell Limit</b> di <b>${o705.toFixed(2)}</b>. SL di atas <b>${sl.toFixed(2)}</b>.`;
            }

            document.getElementById('r62').innerText = o62.toFixed(3);
            document.getElementById('r705').innerText = o705.toFixed(3);
            document.getElementById('r79').innerText = o79.toFixed(3);
            document.getElementById('rSL').innerText = sl.toFixed(3);
            document.getElementById('rTP').innerText = tp.toFixed(3);
            document.getElementById('rWin').innerText = wr;
            document.activeElement.blur();
        }
    </script>
</body>
</html>
