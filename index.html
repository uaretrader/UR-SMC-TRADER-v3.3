<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC Command v3.3</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 5px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-shrink: 0; }
        h2 { color: #f39c12; margin: 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .status { font-weight: bold; color: #2ecc71; font-size: 0.75rem; }
        .chart-container { height: 375px; width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid #444; margin-bottom: 5px; flex-shrink: 0; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 8px; border-left: 4px solid #f39c12; box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        h3 { margin: 0 0 4px 0; font-size: 0.7rem; color: #f39c12; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .fib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        input { width: 100%; padding: 8px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; font-size: 0.85rem; outline: none; }
        .calc-btn { width: 100%; padding: 10px; background: #f39c12; border: none; border-radius: 5px; color: black; font-weight: bold; margin-top: 4px; margin-bottom: 4px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        #setupAdvice { background: #2c3e50; padding: 8px 12px; border-radius: 5px; margin-bottom: 6px; border-left: 4px solid #3498db; font-size: 0.8rem; font-weight: 500; display: none; line-height: 1.4; color: #ffffff; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; text-align: center; margin-bottom: 4px; }
        .res-box { background: #222; padding: 8px 2px; border-radius: 5px; border: 1px solid #333; }
        .res-label { font-size: 0.55rem; color: #aaa; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .res-val { font-weight: 800; font-size: 0.95rem; color: #ffffff; }
        .color-ote { color: #2fff7e !important; } 
        .color-tp { color: #4db8ff !important; }  
        .color-sl { color: #ff5c5c !important; }  
        .signature { text-align: center; color: #c0c0c0; font-size: 0.65rem; margin: auto 0; letter-spacing: 2px; opacity: 0.8; text-transform: lowercase; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📊 SMC COMMAND v3.3</h2>
        <span class="status">LIVE ●</span>
    </div>

    <div class="chart-container">
        <div id="tv_v33" style="height: 100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            new TradingView.widget({
                "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15",
                "timezone": "Asia/Jakarta", "theme": "dark", "style": "1",
                "locale": "id", "hide_side_toolbar": true, 
                "allow_symbol_change": true, "save_image": false,
                "container_id": "tv_v33"
            });
        </script>
    </div>

    <div class="card">
        <h3>📏 SMC Trading Setup</h3>
        <div class="fib-grid">
            <div><input type="number" id="startP" placeholder="Start Price" step="any"></div>
            <div><input type="number" id="endP" placeholder="End Price" step="any"></div>
        </div>
        <button class="calc-btn" onclick="processSMC()">SETUP CONFIRMATION</button>
        <div id="setupAdvice"></div>

        <div class="result-grid">
            <div class="res-box"><span class="res-label">0.62 Zone</span><span id="r62" class="res-val">-</span></div>
            <div class="res-box"><span class="res-label">0.705 (OTE)</span><span id="r705" class="res-val color-ote">-</span></div>
            <div class="res-box"><span class="res-label">0.79 Zone</span><span id="r79" class="res-val">-</span></div>
        </div>

        <div class="result-grid">
            <div class="res-box"><span class="res-label">Target TP</span><span id="rTP1" class="res-val color-tp">-</span></div>
            <div class="res-box"><span class="res-label">Stop Loss</span><span id="rSL" class="res-val color-sl">-</span></div>
            <div class="res-box" style="border: 1px solid #f39c12;"><span class="res-label" style="color:#f39c12;">Probabilitas</span><span id="rProb" class="res-val" style="color:#f39c12;">-</span></div>
        </div>

        <div class="signature">urtrader©</div>
    </div>

    <script>
        function processSMC() {
            const start = parseFloat(document.getElementById('startP').value);
            const end = parseFloat(document.getElementById('endP').value);
            const box = document.getElementById('setupAdvice');
            
            if (isNaN(start) || isNaN(end)) { alert("Masukkan Start & End Price!"); return; }

            const range = Math.abs(start - end);
            let o62, o705, o79, sl, tp1, prob;

            if (end > start) { 
                // BULLISH (Harga naik dari Start ke End)
                o62 = end - (range * 0.62); 
                o705 = end - (range * 0.705); 
                o79 = end - (range * 0.79);
                sl = start - (range * 0.1); 
                tp1 = end + (range * 0.27);
                prob = "65 - 75%";
                box.innerHTML = `🟢 <b>BULLISH:</b> Tunggu koreksi ke <b>Discount</b> (${o705.toFixed(2)}).`;
                box.style.borderLeft = "4px solid #2ecc71";
            } else { 
                // BEARISH (Harga turun dari Start ke End)
                o62 = end + (range * 0.62); 
                o705 = end + (range * 0.705); 
                o79 = end + (range * 0.79);
                sl = start + (range * 0.1); 
                tp1 = end - (range * 0.27);
                prob = "60 - 70%";
                box.innerHTML = `🔴 <b>BEARISH:</b> Tunggu retrace ke <b>Premium</b> (${o705.toFixed(2)}).`;
                box.style.borderLeft = "4px solid #e74c3c";
            }
            
            box.style.display = "block";
            document.getElementById('r62').innerText = o62.toFixed(3);
            document.getElementById('r705').innerText = o705.toFixed(3);
            document.getElementById('r79').innerText = o79.toFixed(3);
            document.getElementById('rSL').innerText = sl.toFixed(3);
            document.getElementById('rTP1').innerText = tp1.toFixed(3);
            document.getElementById('rProb').innerText = prob;
        }

        const inputs = [document.getElementById('startP'), document.getElementById('endP')];
        inputs.forEach(input => {
            input.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    processSMC();
                    this.blur();
                }
            });
        });
    </script>
</body>
</html>
